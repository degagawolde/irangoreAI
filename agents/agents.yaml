# Unified Agent Configuration
# This file defines all available agents for the Graph RAG system

agents:
  
  # Lightweight chat agent - minimal tools
  chat:
    name: "Chat Agent"
    description: "Simple conversational agent with planning and validation"
    type: "react"
    enabled: true
    max_iterations: 12
    system_prompt: |
      You are a helpful assistant providing information from documents.
      ALWAYS plan before answering:
      1. Understand what the user is asking
      2. Identify which tools to use
      3. Gather information systematically
      4. Validate your answer is relevant and from documents
      5. Retry with different tools if needed
      Be thorough and cite sources from documents.
    tools:
      - name: "General Chat"
        description: "For general questions not covered by other tools"
        type: "document_chat"
    memory:
      enabled: true
      type: "neo4j_chat_history"
    verbose: false

  # Vector-based search agent - semantic similarity focus
  vector:
    name: "Vector Search Agent"
    description: "Agent focused on semantic search with planning and validation"
    type: "react"
    enabled: true
    max_iterations: 14
    system_prompt: |
      You are a research assistant specializing in semantic document search.
      PLANNING STRATEGY:
      1. Understand the query and identify key concepts
      2. Use semantic search to find relevant chunks
      3. Analyze and compare results
      4. Validate answers against source documents
      5. If unsatisfied, search with different keywords/concepts
      Always prioritize document-based information over knowledge.
    tools:
      - name: "General Chat"
        description: "For general questions not covered by other tools"
        type: "document_chat"
      - name: "Document Context Search"
        description: "For when you need to find information from documents"
        type: "vector_search"
    memory:
      enabled: true
      type: "neo4j_chat_history"
    verbose: false

  # Cypher query agent - structured graph queries
  cypher:
    name: "Cypher Agent"
    description: "Agent for structured queries with planning and validation"
    type: "react"
    enabled: true
    max_iterations: 16
    system_prompt: |
      You are an expert research assistant with access to structured and semantic search.
      DOCUMENT DISCOVERY STRATEGY:
      1. EXTRACT: Look for specific document type mentions in the question
         Examples: "statement of purpose", "CV", "resume", "cover letter", etc.
      2. SEARCH BY NAME: If documents are explicitly mentioned, search by name first
         Use "Search Documents by Name" tool with the document type
      3. SEMANTIC SEARCH: For general questions, use semantic search to find relevant documents
      4. RETRIEVE: Get chunks from identified documents
      5. SYNTHESIZE: Combine information and cite sources
      Always prioritize explicit document mentions over semantic search.
    tools:
      - name: "General Chat"
        description: "For general questions not covered by other tools"
        type: "document_chat"
      - name: "List Documents"
        description: "List all available documents in the knowledge graph"
        type: "list_documents"
      - name: "Search Documents by Name"
        description: "Search for documents by name pattern (e.g. 'statement of purpose', 'CV')"
        type: "search_documents_by_name"
      - name: "Find Relevant Documents"
        description: "Find which documents are relevant to a query using semantic search"
        type: "find_relevant_documents"
      - name: "Document Context Search"
        description: "For when you need to find information from documents"
        type: "vector_search"
      - name: "Document Information"
        description: "Provide information about document questions using Cypher queries"
        type: "cypher_qa"
    memory:
      enabled: true
      type: "neo4j_chat_history"
    verbose: false

  # Full-featured agent with all tools
  full:
    name: "Full-Featured Agent"
    description: "Comprehensive agent with planning, tool selection, and validation"
    type: "react"
    enabled: true
    max_iterations: 18
    system_prompt: |
      You are an expert research assistant with comprehensive document access.
      INTELLIGENT PLANNING & EXECUTION:
      1. Analyze the question for complexity and information needs
      2. Plan a strategy:
         - For content questions: Use semantic search
         - For relationship questions: Use graph queries
         - For document operations: Use ingestion
         - For general context: Use chat
      3. Execute the planned tool sequence
      4. VALIDATE phase:
         - Check if answer is relevant to the question
         - Verify all sources are from documents
         - Cross-check with alternative tools if uncertain
      5. If validation fails, retry with different tools or search terms
      6. Provide comprehensive answers with source citations
      Always be thorough and strategic in tool usage.
    tools:
      - name: "General Chat"
        description: "For general questions not covered by other tools"
        type: "document_chat"
      - name: "Semantic Search"
        description: "Search semantically similar chunks from documents"
        type: "vector_search"
      - name: "Graph Database Query"
        description: "Query document relationships using Cypher"
        type: "cypher_qa"
      - name: "Document Ingestion"
        description: "Load and ingest documents into the knowledge graph"
        type: "document_ingestion"
    memory:
      enabled: true
      type: "neo4j_chat_history"
    verbose: true

  # Scoped agent - task-specific
  scoped:
    name: "Scoped Agent"
    description: "Agent for focused domain queries with planning"
    type: "react"
    enabled: true
    max_iterations: 12
    system_prompt: |
      You are a specialized research assistant for focused domain queries.
      FOCUSED PLANNING:
      1. Understand the specific domain and question scope
      2. Plan a focused search strategy
      3. Use chat tool to validate understanding
      4. Ensure answers stay within domain scope
      5. Validate all information comes from documents
      Only answer questions within your domain scope.
      Always cite document sources.
    tools:
      - name: "General Chat"
        description: "For general questions not covered by other tools"
        type: "document_chat"
    memory:
      enabled: true
      type: "neo4j_chat_history"
    verbose: false

  # Deep search agent - internet + document research
  deep_search:
    name: "Deep Search Agent"
    description: "Agent for broad research using internet and internal document tools"
    type: "react"
    enabled: true
    max_iterations: 18
    system_prompt: |
      You are an advanced research assistant that can search both the open web and local documents.
      DEEP SEARCH STRATEGY:
      1. Start with web search for broad context and recent public information.
      2. Use internal document tools to verify, enrich, or challenge web findings.
      3. Cross-check important claims across multiple results when possible.
      4. Clearly separate web-derived context from document-derived evidence.
      5. If information is uncertain, state uncertainty and suggest follow-up queries.
      Prioritize accuracy over speed and provide source links when available.
    tools:
      - name: "Internet Search"
        description: "Search public web information and return relevant links and summaries"
        type: "web_search"
      - name: "List Documents"
        description: "List all available documents in the knowledge graph"
        type: "list_documents"
      - name: "Find Relevant Documents"
        description: "Find which documents are relevant to a query using semantic search"
        type: "find_relevant_documents"
      - name: "Document Context Search"
        description: "Search semantic context from indexed local documents"
        type: "vector_search"
      - name: "Document Information"
        description: "Use Cypher-powered graph Q&A for structured document facts"
        type: "cypher_qa"
    memory:
      enabled: true
      type: "neo4j_chat_history"
    verbose: true

# Tool definitions
tools:
  document_chat:
    type: "function"
    module: "llms"
    function: "get_llm"
    description: "General conversation chain"
    
  vector_search:
    type: "function"
    module: "tools.vector_tool"
    function: "semantic_search"
    description: "Vector-based semantic search"
    
  cypher_qa:
    type: "function"
    module: "tools.cypher_tool"
    function: "graph_qa"
    description: "Cypher-based graph queries"
    
  document_ingestion:
    type: "function"
    module: "tools.document_graph_tool"
    function: "ingest_documents_to_graph"
    description: "Document loading and ingestion"
    
  list_documents:
    type: "function"
    module: "tools.document_discovery_tool"
    function: "list_documents"
    description: "List all available documents"
    
  find_relevant_documents:
    type: "function"
    module: "tools.document_discovery_tool"
    function: "find_relevant_documents"
    description: "Find documents relevant to a query"
    
  get_chunks_from_query_documents:
    type: "function"
    module: "tools.document_discovery_tool"
    function: "get_chunks_from_query_documents"
    description: "Find relevant documents and retrieve their chunks"
    
  search_documents_by_name:
    type: "function"
    module: "tools.document_discovery_tool"
    function: "search_documents_by_name"
    description: "Search for documents by name pattern"

  web_search:
    type: "function"
    module: "tools.internet_search_tool"
    function: "web_search"
    description: "Search public internet content for current or external information"

# Global agent settings
settings:
  system_prompt_preamble: |
    You are a tool-using assistant for document-grounded question answering.
    Use available tools deliberately and only provide answers supported by retrieved content.
    If information is missing, say so clearly and suggest what to retrieve next.
  default_agent: "cypher"  # Use cypher for best results
  timeout: 300  # seconds
  max_iterations: 15  # Increased for planning and validation cycles
  verbose_default: true  # Show planning steps
  memory_type: "neo4j_chat_history"
  streaming_enabled: false
